<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecOps Universal — Acceso</title>
    <meta name="description" content="Portal de acceso al panel SecOps Universal Multi-DB Masking Monitor.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        body {
            background-color: #060b14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow orbs */
        .orb-1 { position: fixed; top: -20%; left: -10%; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%); pointer-events: none; }
        .orb-2 { position: fixed; bottom: -20%; right: -10%; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%); pointer-events: none; }

        /* Card */
        .auth-card {
            background: rgba(10, 16, 28, 0.95);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(56,189,248,0.05);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        /* Inputs */
        .auth-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 11px 14px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .auth-input:focus {
            border-color: rgba(56,189,248,0.4);
            background: rgba(56,189,248,0.03);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.08);
        }
        .auth-input::placeholder { color: #334155; }

        /* Buttons */
        .btn-main {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: linear-gradient(135deg, #0284c7, #6366f1);
            color: white;
            letter-spacing: 0.01em;
        }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(2,132,199,0.25); }
        .btn-main:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        /* Switch link */
        .switch-link { color: #38bdf8; cursor: pointer; font-weight: 500; transition: color 0.15s; }
        .switch-link:hover { color: #7dd3fc; }

        /* Animations */
        @keyframes fadeSlide { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .animate-in { animation: fadeSlide 0.3s ease forwards; }

        /* Alert */
        .alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #f87171; }
        .alert-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #34d399; }

        .field-label { display: block; font-size: 11px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

        /* Password strength */
        .strength-bar { height: 3px; border-radius: 2px; transition: all 0.3s; margin-top: 5px; }
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="orb-1"></div>
    <div class="orb-2"></div>

    <div class="auth-card animate-in">
        <!-- Logo -->
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#0284c7,#6366f1)">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <div>
                <div class="text-base font-bold text-slate-100 leading-none">SecOps Universal</div>
                <div class="text-xs text-slate-600 mono mt-0.5">Multi-DB Masking Monitor</div>
            </div>
        </div>

        <!-- ═══ VISTA: LOGIN ═══════════════════════════════════════ -->
        <div id="view-login">
            <h2 class="text-xl font-bold text-slate-100 mb-1">Bienvenido</h2>
            <p class="text-sm text-slate-500 mb-6">Accede con tu cuenta para continuar</p>

            <div id="login-alert" class="hidden mb-4"></div>

            <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="field-label">Correo Electrónico</label>
                    <input id="login-email" type="email" placeholder="tu@correo.com" class="auth-input" required autocomplete="email">
                </div>
                <div>
                    <label class="field-label">Contraseña</label>
                    <input id="login-password" type="password" placeholder="••••••••" class="auth-input" required autocomplete="current-password">
                </div>
                <button type="submit" id="btn-login" class="btn-main mt-2">
                    Iniciar Sesión
                </button>
            </form>

            <div class="flex items-center gap-3 my-4">
                <div class="flex-1 h-px bg-slate-800"></div>
                <span class="text-xs text-slate-600">o</span>
                <div class="flex-1 h-px bg-slate-800"></div>
            </div>

            <a href="/auth/google/login" class="flex items-center justify-center gap-3 w-full py-2.5 px-4 rounded-lg border border-slate-700 hover:border-slate-600 bg-white/5 hover:bg-white/10 transition-all">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="text-sm font-medium text-slate-300">Continuar con Google</span>
            </a>

            <p class="text-center text-sm text-slate-600 mt-6">
                ¿No tienes cuenta?
                <span class="switch-link" onclick="showRegister()">Regístrate aquí</span>
            </p>
        </div>

        <!-- ═══ VISTA: REGISTRO ════════════════════════════════════ -->
        <div id="view-register" class="hidden">
            <h2 class="text-xl font-bold text-slate-100 mb-1">Crear Cuenta</h2>
            <p class="text-sm text-slate-500 mb-6">Únete a SecOps Universal</p>

            <div id="register-alert" class="hidden mb-4"></div>

            <form id="form-register" onsubmit="handleRegister(event)" class="space-y-4">
                <div>
                    <label class="field-label">Nombre Completo</label>
                    <input id="reg-nombre" type="text" placeholder="Juan García" class="auth-input" required autocomplete="name">
                </div>
                <div>
                    <label class="field-label">Correo Electrónico</label>
                    <input id="reg-email" type="email" placeholder="tu@correo.com" class="auth-input" required autocomplete="email">
                </div>
                <div>
                    <label class="field-label">Contraseña</label>
                    <input id="reg-password" type="password" placeholder="Mínimo 8 caracteres" class="auth-input" required autocomplete="new-password" oninput="updateStrength(this.value)">
                    <div id="strength-bar" class="strength-bar bg-slate-800 w-full mt-1"></div>
                    <p id="strength-label" class="text-xs text-slate-700 mt-1"></p>
                </div>
                <div>
                    <label class="field-label">Confirmar Contraseña</label>
                    <input id="reg-password2" type="password" placeholder="Repite tu contraseña" class="auth-input" required autocomplete="new-password">
                </div>
                <button type="submit" id="btn-register" class="btn-main mt-2">
                    Crear Cuenta
                </button>
            </form>

            <p class="text-center text-sm text-slate-600 mt-6">
                ¿Ya tienes cuenta?
                <span class="switch-link" onclick="showLogin()">Inicia sesión</span>
            </p>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-slate-700 mt-6 mono">
            SecOps Universal v5.0 · Datos protegidos
        </p>
    </div>

    <script>
        // ── VIEW SWITCHING ────────────────────────────────────────────────────
        function showLogin() {
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('view-register').classList.add('hidden');
            clearAlerts();
        }
        function showRegister() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-register').classList.remove('hidden');
            clearAlerts();
        }
        function clearAlerts() {
            ['login-alert','register-alert'].forEach(id => {
                const el = document.getElementById(id);
                el.className = 'hidden mb-4';
                el.textContent = '';
            });
        }
        function showAlert(id, msg, type = 'error') {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = `mb-4 ${type === 'error' ? 'alert-error' : 'alert-success'}`;
        }

        // ── PASSWORD STRENGTH ─────────────────────────────────────────────────
        function updateStrength(val) {
            const bar = document.getElementById('strength-bar');
            const lbl = document.getElementById('strength-label');
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const levels = [
                { pct:'25%', color:'#ef4444', label:'Muy débil' },
                { pct:'50%', color:'#f59e0b', label:'Débil' },
                { pct:'75%', color:'#3b82f6', label:'Buena' },
                { pct:'100%', color:'#10b981', label:'Excelente' },
            ];
            const lv = levels[Math.max(0, score-1)];
            bar.style.width = val.length ? lv.pct : '0%';
            bar.style.background = lv.color;
            lbl.textContent = val.length ? lv.label : '';
            lbl.style.color = lv.color;
        }

        // ── LOGIN ─────────────────────────────────────────────────────────────
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.textContent = 'Verificando...';
            btn.disabled = true;

            const body = new URLSearchParams({
                correo:   document.getElementById('login-email').value,
                password: document.getElementById('login-password').value,
            });

            try {
                const res = await fetch('/api/login', { method:'POST', body, headers:{'Content-Type':'application/x-www-form-urlencoded'} });
                const data = await res.json();
                if (res.ok) {
                    showAlert('login-alert', `Bienvenido, ${data.nombre}. Redirigiendo...`, 'success');
                    setTimeout(() => window.location.href = '/', 800);
                } else {
                    showAlert('login-alert', data.detail || 'Error al iniciar sesión.');
                }
            } catch {
                showAlert('login-alert', 'Error de conexión con el servidor.');
            } finally {
                btn.textContent = 'Iniciar Sesión';
                btn.disabled = false;
            }
        }

        // ── REGISTER ──────────────────────────────────────────────────────────
        async function handleRegister(e) {
            e.preventDefault();
            const pw1 = document.getElementById('reg-password').value;
            const pw2 = document.getElementById('reg-password2').value;

            if (pw1 !== pw2) {
                showAlert('register-alert', 'Las contraseñas no coinciden.');
                return;
            }
            if (pw1.length < 8) {
                showAlert('register-alert', 'La contraseña debe tener al menos 8 caracteres.');
                return;
            }

            const btn = document.getElementById('btn-register');
            btn.textContent = 'Creando cuenta...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre:   document.getElementById('reg-nombre').value,
                        correo:   document.getElementById('reg-email').value,
                        password: pw1,
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert('register-alert', `Cuenta creada, ${data.nombre}. Redirigiendo...`, 'success');
                    setTimeout(() => window.location.href = '/', 800);
                } else {
                    showAlert('register-alert', data.detail || 'Error al crear la cuenta.');
                }
            } catch {
                showAlert('register-alert', 'Error de conexión con el servidor.');
            } finally {
                btn.textContent = 'Crear Cuenta';
                btn.disabled = false;
            }
        }

        // Mostrar error de URL si existe (ej: sesión expirada)
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            showAlert('login-alert', decodeURIComponent(params.get('error')));
        }
    </script>
</body>
</html>
